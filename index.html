<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中学1年生 動詞テスト</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d2e;
    --surface2: #222538;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --success: #43e97b;
    --error: #ff6584;
    --text: #eeeef5;
    --text-muted: #888aa8;
    --border: #2e3150;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(108,99,255,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 80% 80%, rgba(255,101,132,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }
  .wrap { width: 100%; max-width: 680px; position: relative; z-index: 1; }

  header { text-align: center; margin-bottom: 28px; }
  .logo { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--accent); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 10px; }
  h1 { font-size: clamp(22px, 4vw, 30px); font-weight: 900; color: var(--text); line-height: 1.2; }
  h1 span { color: var(--accent); }

  /* Name screen */
  #name-screen { animation: fadeUp 0.4s ease; }
  .name-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 28px 24px; margin-bottom: 16px; }
  .name-label { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; }
  .name-input {
    width: 100%; background: var(--surface2); border: 2px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px; color: var(--text);
    font-size: 18px; font-family: 'Noto Sans JP', sans-serif;
    outline: none; transition: border-color 0.18s; margin-bottom: 16px;
  }
  .name-input:focus { border-color: var(--accent); }
  .name-btn {
    width: 100%; background: var(--accent); color: #fff; border: none;
    border-radius: var(--radius); padding: 14px; font-size: 16px;
    font-weight: 700; font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer; transition: all 0.18s;
  }
  .name-btn:hover { background: #7c75ff; }
  .name-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Top nav */
  .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .user-badge { background: var(--surface); border: 1px solid var(--border); border-radius: 99px; padding: 6px 14px; font-size: 13px; display: flex; align-items: center; gap: 6px; }
  .user-badge span { color: var(--accent); font-weight: 700; }
  .history-btn {
    background: var(--surface); border: 1px solid var(--border); border-radius: 99px;
    padding: 6px 14px; font-size: 13px; color: var(--text-muted);
    cursor: pointer; transition: all 0.18s; font-family: 'Noto Sans JP', sans-serif;
  }
  .history-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Category screen */
  #category-screen { animation: fadeUp 0.4s ease; }
  .section-label { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px; }
  .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
  .cat-btn {
    background: var(--surface); border: 2px solid var(--border); border-radius: var(--radius);
    padding: 14px 16px; color: var(--text); font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px; cursor: pointer; transition: all 0.18s; text-align: left;
    display: flex; align-items: center; gap: 10px;
  }
  .cat-btn:hover { border-color: var(--accent); background: var(--surface2); }
  .cat-btn.selected { border-color: var(--accent); background: rgba(108,99,255,0.15); color: #fff; }
  .cat-btn .icon { font-size: 20px; flex-shrink: 0; }
  .cat-btn .info { display: flex; flex-direction: column; gap: 2px; }
  .cat-btn .cat-name { font-weight: 700; font-size: 14px; }
  .cat-btn .cat-count { font-size: 11px; color: var(--text-muted); font-family: 'Space Mono', monospace; }
  .cat-btn.selected .cat-count { color: var(--accent); }
  .all-btn {
    background: var(--surface); border: 2px solid var(--border); border-radius: var(--radius);
    padding: 14px 20px; color: var(--text); font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px; cursor: pointer; transition: all 0.18s; display: flex;
    align-items: center; gap: 10px; width: 100%; margin-bottom: 24px; font-weight: 700;
  }
  .all-btn:hover { border-color: var(--accent); background: var(--surface2); }
  .all-btn.selected { border-color: var(--accent); background: rgba(108,99,255,0.15); }
  .start-btn {
    width: 100%; background: var(--accent); color: #fff; border: none;
    border-radius: var(--radius); padding: 16px; font-size: 16px; font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif; cursor: pointer; transition: all 0.18s; letter-spacing: 1px;
  }
  .start-btn:hover { background: #7c75ff; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(108,99,255,0.35); }
  .start-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

  /* Quiz screen */
  #quiz-screen { display: none; animation: fadeUp 0.4s ease; }
  .progress-bar-wrap { background: var(--surface); border-radius: 99px; height: 6px; margin-bottom: 24px; overflow: hidden; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 99px; transition: width 0.4s ease; }
  .quiz-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-family: 'Space Mono', monospace; font-size: 12px; }
  .q-counter { color: var(--text-muted); }
  .score-badge { background: var(--surface); border: 1px solid var(--border); border-radius: 99px; padding: 4px 12px; display: flex; gap: 10px; }
  .score-badge .correct { color: var(--success); }
  .score-badge .wrong { color: var(--error); }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 28px 24px; margin-bottom: 20px; }
  .category-tag { display: inline-block; background: rgba(108,99,255,0.18); color: var(--accent); border-radius: 99px; padding: 3px 12px; font-size: 11px; font-family: 'Space Mono', monospace; letter-spacing: 1px; margin-bottom: 16px; }
  .sentence { font-size: clamp(18px, 3.5vw, 24px); font-weight: 700; line-height: 1.7; color: var(--text); margin-bottom: 8px; }
  .blank { display: inline-block; min-width: 90px; border-bottom: 3px solid var(--accent); padding: 0 4px; text-align: center; color: var(--accent); font-family: 'Space Mono', monospace; vertical-align: bottom; transition: all 0.2s; }
  .meaning { color: var(--text-muted); font-size: 13px; margin-top: 10px; }
  .meaning strong { color: var(--accent2); }
  .input-row { display: flex; gap: 10px; margin-top: 20px; }
  .answer-input { flex: 1; background: var(--surface2); border: 2px solid var(--border); border-radius: var(--radius); padding: 14px 16px; color: var(--text); font-size: 18px; font-family: 'Space Mono', monospace; outline: none; transition: border-color 0.18s; }
  .answer-input:focus { border-color: var(--accent); }
  .answer-input.correct-input { border-color: var(--success); background: rgba(67,233,123,0.07); }
  .answer-input.wrong-input { border-color: var(--error); background: rgba(255,101,132,0.07); }
  .submit-btn { background: var(--accent); color: #fff; border: none; border-radius: var(--radius); padding: 14px 24px; font-size: 15px; font-weight: 700; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; transition: all 0.18s; white-space: nowrap; }
  .submit-btn:hover { background: #7c75ff; }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .feedback { border-radius: var(--radius); padding: 16px 20px; margin-bottom: 16px; display: none; animation: pop 0.25s cubic-bezier(0.34,1.56,0.64,1); }
  .feedback.show { display: flex; align-items: flex-start; gap: 12px; }
  .feedback.correct { background: rgba(67,233,123,0.1); border: 1px solid rgba(67,233,123,0.3); }
  .feedback.wrong { background: rgba(255,101,132,0.1); border: 1px solid rgba(255,101,132,0.3); }
  .feedback-icon { font-size: 22px; flex-shrink: 0; margin-top: 2px; }
  .feedback-text { font-size: 14px; line-height: 1.6; }
  .feedback-text .answer { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 16px; }
  .feedback.correct .feedback-text .answer { color: var(--success); }
  .feedback.wrong .feedback-text .answer { color: var(--error); }
  .feedback-text .correct-answer { font-family: 'Space Mono', monospace; font-weight: 700; color: var(--success); }
  .next-btn { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; color: var(--text); font-size: 15px; font-family: 'Noto Sans JP', sans-serif; font-weight: 700; cursor: pointer; transition: all 0.18s; display: none; }
  .next-btn:hover { background: var(--accent); border-color: var(--accent); }
  .next-btn.show { display: block; animation: fadeUp 0.25s ease; }

  /* Result screen */
  #result-screen { display: none; text-align: center; animation: fadeUp 0.5s ease; }
  .result-circle { width: 140px; height: 140px; border-radius: 50%; border: 6px solid var(--accent); display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 24px auto; background: rgba(108,99,255,0.1); }
  .result-score { font-family: 'Space Mono', monospace; font-size: 42px; font-weight: 700; color: var(--accent); }
  .result-total { font-size: 13px; color: var(--text-muted); }
  .result-msg { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  .result-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 32px; }
  .result-stats { display: flex; gap: 12px; justify-content: center; margin-bottom: 32px; }
  .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 24px; text-align: center; flex: 1; }
  .stat-num { font-family: 'Space Mono', monospace; font-size: 28px; font-weight: 700; }
  .stat-num.c { color: var(--success); }
  .stat-num.w { color: var(--error); }
  .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .missed-section { text-align: left; margin-bottom: 20px; }
  .missed-title { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; }
  .missed-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; margin-bottom: 8px; font-size: 13px; display: flex; gap: 12px; align-items: flex-start; }
  .missed-verb { font-family: 'Space Mono', monospace; color: var(--error); font-weight: 700; min-width: 80px; }
  .missed-sentence { color: var(--text-muted); line-height: 1.5; }
  .missed-sentence strong { color: var(--success); font-family: 'Space Mono', monospace; }
  .save-status { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; min-height: 20px; }
  .btn-row { display: flex; gap: 10px; }
  .retry-btn, .back-btn { flex: 1; border-radius: var(--radius); padding: 14px; font-size: 15px; font-weight: 700; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; transition: all 0.18s; border: none; }
  .retry-btn { background: var(--accent); color: #fff; }
  .retry-btn:hover { background: #7c75ff; }
  .back-btn { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  .back-btn:hover { background: var(--surface2); }

  /* History screen */
  #history-screen { display: none; animation: fadeUp 0.4s ease; }
  .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .history-header h2 { font-size: 18px; font-weight: 900; }
  .close-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 99px; padding: 6px 14px; font-size: 13px; color: var(--text-muted); cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: all 0.18s; }
  .close-btn:hover { border-color: var(--accent); color: var(--accent); }
  .history-summary { display: flex; gap: 10px; margin-bottom: 20px; }
  .summary-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; text-align: center; flex: 1; }
  .summary-num { font-family: 'Space Mono', monospace; font-size: 24px; font-weight: 700; color: var(--accent); }
  .summary-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .history-empty { text-align: center; color: var(--text-muted); padding: 40px 0; font-size: 14px; }
  .history-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 10px; animation: fadeUp 0.3s ease; }
  .history-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .history-meta { flex: 1; }
  .history-date { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
  .history-cats { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
  .history-cat-tag { background: rgba(108,99,255,0.15); color: var(--accent); border-radius: 99px; padding: 2px 10px; font-size: 11px; }
  .history-score-col { text-align: right; }
  .history-pct { font-family: 'Space Mono', monospace; font-size: 28px; font-weight: 700; }
  .history-pct.high { color: var(--success); }
  .history-pct.mid { color: #ffd166; }
  .history-pct.low { color: var(--error); }
  .history-counts { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .history-missed { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
  .history-missed-label { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--text-muted); letter-spacing: 1px; margin-bottom: 6px; }
  .history-missed-words { display: flex; flex-wrap: wrap; gap: 5px; }
  .missed-word-tag { background: rgba(255,101,132,0.12); color: var(--error); border-radius: 6px; padding: 2px 8px; font-size: 12px; font-family: 'Space Mono', monospace; }
  .loading-text { text-align: center; color: var(--text-muted); padding: 24px; font-size: 13px; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pop { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">中学1年生 英語</div>
    <h1>動詞<span>暗記</span>テスト</h1>
  </header>

  <!-- Name Screen -->
  <div id="name-screen">
    <div class="name-card">
      <div class="name-label">あなたの名前を入力してください</div>
      <input class="name-input" id="name-input" type="text" placeholder="例：山田 太郎" maxlength="20"
        onkeydown="if(event.key==='Enter')confirmName()"
        oninput="document.getElementById('name-confirm-btn').disabled=!this.value.trim()">
      <button class="name-btn" id="name-confirm-btn" onclick="confirmName()" disabled>はじめる →</button>
    </div>
  </div>

  <!-- Top Nav -->
  <div class="top-nav" id="top-nav" style="display:none">
    <div class="user-badge">👤 <span id="nav-username"></span></div>
    <button class="history-btn" onclick="showHistory()">📋 履歴を見る</button>
  </div>

  <!-- Category Screen -->
  <div id="category-screen" style="display:none">
    <div class="section-label">カテゴリを選ぶ</div>
    <button class="all-btn" id="btn-all" onclick="toggleAll()">
      <span>🌟</span> すべての動詞（100語）
    </button>
    <div class="cat-grid" id="cat-grid"></div>
    <button class="start-btn" id="start-btn" onclick="startQuiz()" disabled>テストを始める →</button>
  </div>

  <!-- Quiz Screen -->
  <div id="quiz-screen">
    <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
    <div class="quiz-meta">
      <div class="q-counter" id="q-counter">1 / 20</div>
      <div class="score-badge">
        <span class="correct">✓ <span id="score-correct">0</span></span>
        <span class="wrong">✗ <span id="score-wrong">0</span></span>
      </div>
    </div>
    <div class="card">
      <div class="category-tag" id="q-cat">移動・動作</div>
      <div class="sentence" id="q-sentence"></div>
      <div class="meaning" id="q-meaning"></div>
    </div>
    <div class="feedback" id="feedback">
      <div class="feedback-icon" id="fb-icon"></div>
      <div class="feedback-text" id="fb-text"></div>
    </div>
    <div class="input-row">
      <input class="answer-input" id="answer-input" type="text" placeholder="動詞を入力..." autocomplete="off" autocorrect="off" spellcheck="false" onkeydown="handleKey(event)">
      <button class="submit-btn" id="submit-btn" onclick="submitAnswer()">答える</button>
    </div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">次の問題 →</button>
  </div>

  <!-- Result Screen -->
  <div id="result-screen">
    <div class="result-msg" id="result-msg"></div>
    <div class="result-circle">
      <div class="result-score" id="result-score"></div>
      <div class="result-total" id="result-total"></div>
    </div>
    <div class="result-sub" id="result-sub"></div>
    <div class="result-stats">
      <div class="stat-box"><div class="stat-num c" id="r-correct">0</div><div class="stat-label">正解</div></div>
      <div class="stat-box"><div class="stat-num w" id="r-wrong">0</div><div class="stat-label">不正解</div></div>
    </div>
    <div class="missed-section" id="missed-section"></div>
    <div class="save-status" id="save-status"></div>
    <div class="btn-row">
      <button class="retry-btn" onclick="retryQuiz()">もう一度</button>
      <button class="back-btn" onclick="backToCategory()">カテゴリ選択に戻る</button>
    </div>
  </div>

  <!-- History Screen -->
  <div id="history-screen">
    <div class="history-header">
      <h2>📋 テスト履歴</h2>
      <button class="close-btn" onclick="closeHistory()">✕ 閉じる</button>
    </div>
    <div id="history-summary" class="history-summary" style="display:none"></div>
    <div id="history-list"></div>
  </div>
</div>

<script>
const ALL_VERBS = [
  { verb: "am", sentence: "I ___ a student.", meaning: "私は学生です。", category: "be動詞", alt: ["am"] },
  { verb: "go", sentence: "I ___ to school.", meaning: "私は学校へ行く。", category: "移動・動作" },
  { verb: "come", sentence: "___ here, please.", meaning: "ここに来てください。", category: "移動・動作" },
  { verb: "run", sentence: "I ___ every day.", meaning: "私は毎日走る。", category: "移動・動作" },
  { verb: "walk", sentence: "I ___ to school.", meaning: "私は学校まで歩く。", category: "移動・動作" },
  { verb: "swim", sentence: "I ___ in the pool.", meaning: "私はプールで泳ぐ。", category: "移動・動作" },
  { verb: "ride", sentence: "I ___ a bike.", meaning: "私は自転車に乗る。", category: "移動・動作" },
  { verb: "drive", sentence: "My dad ___ a car.", meaning: "私のお父さんは車を運転する。", category: "移動・動作" },
  { verb: "fly", sentence: "Birds ___ high.", meaning: "鳥は高く飛ぶ。", category: "移動・動作" },
  { verb: "jump", sentence: "I ___ rope.", meaning: "私は縄跳びをする。", category: "移動・動作" },
  { verb: "sit", sentence: "___ down, please.", meaning: "座ってください。", category: "移動・動作" },
  { verb: "stand", sentence: "___ up!", meaning: "立って！", category: "移動・動作" },
  { verb: "stop", sentence: "___ here.", meaning: "ここで止まれ。", category: "移動・動作" },
  { verb: "wake", sentence: "I ___ up early.", meaning: "私は早く起きる。", category: "移動・動作" },
  { verb: "sleep", sentence: "I ___ at ten.", meaning: "私は10時に寝る。", category: "移動・動作" },
  { verb: "get", sentence: "I ___ up at seven.", meaning: "私は7時に起きる。", category: "移動・動作" },
  { verb: "move", sentence: "___ to the right.", meaning: "右に動いて。", category: "移動・動作" },
  { verb: "climb", sentence: "I ___ the mountain.", meaning: "私は山を登る。", category: "移動・動作" },
  { verb: "fall", sentence: "Leaves ___ in autumn.", meaning: "葉は秋に落ちる。", category: "移動・動作" },
  { verb: "turn", sentence: "___ left here.", meaning: "ここで左に曲がって。", category: "移動・動作" },
  { verb: "return", sentence: "I ___ home early.", meaning: "私は早く家に帰る。", category: "移動・動作" },
  { verb: "eat", sentence: "I ___ rice every day.", meaning: "私は毎日ご飯を食べる。", category: "日常生活" },
  { verb: "drink", sentence: "I ___ water.", meaning: "私は水を飲む。", category: "日常生活" },
  { verb: "cook", sentence: "I ___ dinner.", meaning: "私は夕食を作る。", category: "日常生活" },
  { verb: "wash", sentence: "I ___ my hands.", meaning: "私は手を洗う。", category: "日常生活" },
  { verb: "clean", sentence: "I ___ my room.", meaning: "私は部屋を掃除する。", category: "日常生活" },
  { verb: "make", sentence: "I ___ lunch.", meaning: "私は昼食を作る。", category: "日常生活" },

const CATEGORIES = [
  { name: "be動詞", icon: "🔵" },
  { name: "移動・動作", icon: "🏃" },
  { name: "日常生活", icon: "🏠" },
  { name: "コミュニケーション", icon: "💬" },
  { name: "学習・創作", icon: "📚" },
  { name: "気持ち・思考", icon: "💭" },
  { name: "知覚・状態", icon: "👁️" },
];

let currentUser = '';
let selectedCategories = new Set();
let allSelected = false;
let questions = [];
let currentIndex = 0;
let correctCount = 0;
let wrongCount = 0;
let answered = false;
let missedVerbs = [];
let quizCategories = [];

function show(id) { document.getElementById(id).style.display = 'block'; }
function hide(id) { document.getElementById(id).style.display = 'none'; }

// ── Name ──
function confirmName() {
  const name = document.getElementById('name-input').value.trim();
  if (!name) return;
  currentUser = name;
  hide('name-screen');
  document.getElementById('top-nav').style.display = 'flex';
  document.getElementById('nav-username').textContent = name;
  buildCategoryGrid();
  show('category-screen');
}

// ── Categories ──
function buildCategoryGrid() {
  const grid = document.getElementById('cat-grid');
  if (grid.children.length > 0) return;
  CATEGORIES.forEach(cat => {
    const count = ALL_VERBS.filter(v => v.category === cat.name).length;
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.id = 'cat-' + cat.name;
    btn.innerHTML = `<span class="icon">${cat.icon}</span><div class="info"><div class="cat-name">${cat.name}</div><div class="cat-count">${count}語</div></div>`;
    btn.onclick = () => toggleCat(cat.name);
    grid.appendChild(btn);
  });
}

function toggleAll() {
  allSelected = !allSelected;
  document.getElementById('btn-all').classList.toggle('selected', allSelected);
  if (allSelected) {
    selectedCategories = new Set(CATEGORIES.map(c => c.name));
    CATEGORIES.forEach(c => document.getElementById('cat-' + c.name).classList.add('selected'));
  } else {
    selectedCategories.clear();
    CATEGORIES.forEach(c => document.getElementById('cat-' + c.name).classList.remove('selected'));
  }
  updateStartBtn();
}

function toggleCat(name) {
  const btn = document.getElementById('cat-' + name);
  if (selectedCategories.has(name)) { selectedCategories.delete(name); btn.classList.remove('selected'); }
  else { selectedCategories.add(name); btn.classList.add('selected'); }
  allSelected = selectedCategories.size === CATEGORIES.length;
  document.getElementById('btn-all').classList.toggle('selected', allSelected);
  updateStartBtn();
}

function updateStartBtn() {
  document.getElementById('start-btn').disabled = selectedCategories.size === 0;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── Quiz ──
function startQuiz() {
  questions = shuffle(ALL_VERBS.filter(v => selectedCategories.has(v.category)));
  quizCategories = [...selectedCategories];
  currentIndex = 0; correctCount = 0; wrongCount = 0; missedVerbs = [];
  hide('category-screen');
  show('quiz-screen');
  showQuestion();
}

function showQuestion() {
  answered = false;
  const q = questions[currentIndex];
  const total = questions.length;
  document.getElementById('progress-bar').style.width = (currentIndex / total * 100) + '%';
  document.getElementById('q-counter').textContent = (currentIndex + 1) + ' / ' + total;
  document.getElementById('score-correct').textContent = correctCount;
  document.getElementById('score-wrong').textContent = wrongCount;
  document.getElementById('q-cat').textContent = q.category;
  document.getElementById('q-sentence').innerHTML = q.sentence.replace('___', '<span class="blank" id="blank-span">　　　</span>');
  document.getElementById('q-meaning').innerHTML = '意味のヒント：<strong>' + q.meaning + '</strong>';
  const input = document.getElementById('answer-input');
  input.value = ''; input.className = 'answer-input'; input.disabled = false; input.focus();
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('next-btn').className = 'next-btn';
}

function handleKey(e) {
  if (e.key === 'Enter') { if (!answered) submitAnswer(); else nextQuestion(); }
}

function submitAnswer() {
  if (answered) return;
  const input = document.getElementById('answer-input');
  const userAnswer = input.value.trim().toLowerCase();
  if (!userAnswer) return;
  answered = true;
  const q = questions[currentIndex];
  const correct = q.verb.toLowerCase();
  const isCorrect = userAnswer === correct || (q.alt && q.alt.includes(userAnswer));
  const blank = document.getElementById('blank-span');
  const feedback = document.getElementById('feedback');
  if (isCorrect) {
    correctCount++;
    input.className = 'answer-input correct-input';
    if (blank) { blank.textContent = correct; blank.style.color = 'var(--success)'; blank.style.borderBottomColor = 'var(--success)'; }
    feedback.className = 'feedback correct show';
    document.getElementById('fb-icon').textContent = '✅';
    document.getElementById('fb-text').innerHTML = `<span class="answer">${correct}</span>　正解！`;
  } else {
    wrongCount++;
    input.className = 'answer-input wrong-input';
    if (blank) { blank.textContent = correct; blank.style.color = 'var(--success)'; blank.style.borderBottomColor = 'var(--success)'; }
    feedback.className = 'feedback wrong show';
    document.getElementById('fb-icon').textContent = '❌';
    document.getElementById('fb-text').innerHTML = `あなたの答え：<span class="answer">${userAnswer}</span><br>正解：<span class="correct-answer">${correct}</span>`;
    missedVerbs.push(q);
  }
  document.getElementById('submit-btn').disabled = true;
  input.disabled = true;
  document.getElementById('score-correct').textContent = correctCount;
  document.getElementById('score-wrong').textContent = wrongCount;
  const nextBtn = document.getElementById('next-btn');
  nextBtn.textContent = currentIndex + 1 < questions.length ? '次の問題 →' : '結果を見る →';
  nextBtn.className = 'next-btn show';
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= questions.length) showResult();
  else showQuestion();
}

// ── Result + Save ──
async function showResult() {
  hide('quiz-screen');
  show('result-screen');
  const total = questions.length;
  const pct = Math.round(correctCount / total * 100);
  let msg, sub;
  if (pct === 100) { msg = '🏆 パーフェクト！'; sub = '全問正解！すばらしい！'; }
  else if (pct >= 80) { msg = '🎉 よくできました！'; sub = `${pct}点！もう少しで満点！`; }
  else if (pct >= 60) { msg = '📖 がんばりました！'; sub = `${pct}点。苦手な動詞を復習しよう！`; }
  else { msg = '💪 練習が必要！'; sub = `${pct}点。もう一度チャレンジしよう！`; }
  document.getElementById('result-msg').textContent = msg;
  document.getElementById('result-score').textContent = pct + '%';
  document.getElementById('result-total').textContent = correctCount + ' / ' + total + '問正解';
  document.getElementById('result-sub').textContent = sub;
  document.getElementById('r-correct').textContent = correctCount;
  document.getElementById('r-wrong').textContent = wrongCount;
  const ms = document.getElementById('missed-section');
  if (missedVerbs.length > 0) {
    let html = '<div class="missed-title">間違えた動詞</div>';
    missedVerbs.forEach(v => {
      html += `<div class="missed-item"><span class="missed-verb">${v.verb}</span><span class="missed-sentence">${v.sentence.replace('___', `<strong>${v.verb}</strong>`)}</span></div>`;
    });
    ms.innerHTML = html;
  } else { ms.innerHTML = ''; }

  await saveHistory(pct, total);
}

async function saveHistory(pct, total) {
  const status = document.getElementById('save-status');
  status.textContent = '💾 履歴を保存中...';
  const now = new Date();
  const dateStr = now.toLocaleDateString('ja-JP', {year:'numeric',month:'2-digit',day:'2-digit'})
    + ' ' + now.toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit'});
  const record = {
    date: dateStr,
    timestamp: now.getTime(),
    categories: quizCategories,
    score: pct,
    correct: correctCount,
    total,
    missed: missedVerbs.map(v => v.verb),
  };
  try {
    const key = 'verb-history:' + currentUser;
    let history = [];
    try {
      const res = await window.storage.get(key, true);
      if (res && res.value) history = JSON.parse(res.value);
    } catch(e) { history = []; }
    history.unshift(record);
    if (history.length > 50) history = history.slice(0, 50);
    await window.storage.set(key, JSON.stringify(history), true);
    status.textContent = '✅ 履歴を保存しました';
  } catch(e) {
    status.textContent = '⚠️ 保存できませんでした（オフライン時は記録されません）';
  }
}

// ── History ──
async function showHistory() {
  hide('category-screen');
  show('history-screen');
  const list = document.getElementById('history-list');
  const summaryEl = document.getElementById('history-summary');
  list.innerHTML = '<div class="loading-text">📂 履歴を読み込み中...</div>';
  summaryEl.style.display = 'none';

  try {
    const key = 'verb-history:' + currentUser;
    let history = [];
    try {
      const res = await window.storage.get(key, true);
      if (res && res.value) history = JSON.parse(res.value);
    } catch(e) { history = []; }

    if (history.length === 0) {
      list.innerHTML = '<div class="history-empty">📭 まだ履歴がありません。<br>テストを受けると自動で記録されます！</div>';
      return;
    }

    // Summary stats
    const avgScore = Math.round(history.reduce((s, r) => s + r.score, 0) / history.length);
    const best = Math.max(...history.map(r => r.score));
    summaryEl.style.display = 'flex';
    summaryEl.innerHTML = `
      <div class="summary-box"><div class="summary-num">${history.length}</div><div class="summary-label">回受験</div></div>
      <div class="summary-box"><div class="summary-num">${avgScore}%</div><div class="summary-label">平均スコア</div></div>
      <div class="summary-box"><div class="summary-num">${best}%</div><div class="summary-label">最高スコア</div></div>
    `;

    list.innerHTML = '';
    history.forEach(r => {
      const pctClass = r.score >= 80 ? 'high' : r.score >= 60 ? 'mid' : 'low';
      const catsHtml = (r.categories || []).map(c => `<span class="history-cat-tag">${c}</span>`).join('');
      const missedHtml = r.missed && r.missed.length > 0
        ? `<div class="history-missed">
             <div class="history-missed-label">間違えた単語</div>
             <div class="history-missed-words">${r.missed.map(w => `<span class="missed-word-tag">${w}</span>`).join('')}</div>
           </div>` : '';
      const item = document.createElement('div');
      item.className = 'history-item';
      item.innerHTML = `
        <div class="history-top">
          <div class="history-meta">
            <div class="history-date">🕐 ${r.date}</div>
            <div class="history-cats">${catsHtml}</div>
          </div>
          <div class="history-score-col">
            <div class="history-pct ${pctClass}">${r.score}%</div>
            <div class="history-counts">✓${r.correct} ✗${r.total - r.correct} / ${r.total}問</div>
          </div>
        </div>
        ${missedHtml}
      `;
      list.appendChild(item);
    });
  } catch(e) {
    list.innerHTML = '<div class="history-empty">⚠️ 履歴の読み込みに失敗しました。</div>';
  }
}

function closeHistory() {
  hide('history-screen');
  show('category-screen');
}

function retryQuiz() {
  hide('result-screen');
  startQuiz();
}

function backToCategory() {
  hide('result-screen');
  show('category-screen');
}
